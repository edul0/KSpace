<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner Pro | Enterprise</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body class="light-mode" id="body-app">
    <header>
        <div class="header-left">
            <div class="user-profile" id="user-profile" onclick="toggleDarkMode()" title="Clique para Alternar Tema">
                <span>Sincronizando...</span>
            </div>
            <div class="search-container">
                <input type="text" id="board-search" placeholder="Filtrar por nome, @nick ou data..." oninput="renderBoard()">
            </div>
        </div>
        <div class="actions">
            <button class="btn-share" onclick="shareBoard()">Compartilhar Plano</button>
            <button class="btn-user-change" onclick="changeUser()">Trocar User</button>
        </div>
    </header>
    <main id="kanban-board" class="board-container"></main>
    <div id="log-panel" class="log-panel">
        <div class="log-header">
            Histórico
            <button class="clear-logs-btn" onclick="clearLogs()">🗑️</button>
        </div>
        <div id="log-content" class="log-content"></div>
    </div>
</body>
</html>
